  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

002Fa>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n      <!-- PRIMARY -->\n      <div style=\"border:1px solid var(--hair); background:var(--paper); border-top:3px solid var(--copper);\">\n        <div style=\"padding:18px 22px; border-bottom:1px solid var(--hair); display:flex; align-items:baseline; justify-content:space-between;\">\n          <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--copper);\">Primary Election<\u002Fdiv><div style=\"font-size:22px; font-weight:800; letter-spacing:-0.01em; margin-top:4px;\">Tuesday, Aug 4, 2026<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.06em; color:var(--faint); text-align:right;\">Statewide primary<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:6px 22px 18px;\">\n          <div style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--hair);\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--copper); flex:none; width:120px;\">Jul 20<\u002Fspan><span style=\"font-size:13.5px; color:var(--ink);\">Voter registration deadline (mail or online)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--hair);\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--copper); flex:none; width:120px;\">Jul 21<\u002Fspan><span style=\"font-size:13.5px; color:var(--ink);\">Last recommended day to <strong>mail<\u002Fstrong> your absentee ballot<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--hair);\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--copper); flex:none; width:120px;\">Jul 21 – Aug 4<\u002Fspan><span style=\"font-size:13.5px; color:var(--ink);\">In-person registration at your clerk's office<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--hair);\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--copper); flex:none; width:120px;\">Jul 25 – Aug 2<\u002Fspan><span style=\"font-size:13.5px; color:var(--ink);\">Early in-person voting<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; padding:12px 0;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--copper); flex:none; width:120px;\">Aug 4<\u002Fspan><span style=\"font-size:13.5px; color:var(--ink); font-weight:600;\">Polls open 7 a.m. – 8 p.m.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- GENERAL -->\n      <div style=\"border:1px solid var(--hair); background:var(--paper); border-top:3px solid var(--lake);\">\n        <div style=\"padding:18px 22px; border-bottom:1px solid var(--hair); display:flex; align-items:baseline; justify-content:space-between;\">\n          <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--lake);\">General Election<\u002Fdiv><div style=\"font-size:22px; font-weight:800; letter-spacing:-0.01em; margin-top:4px;\">Tuesday, Nov 3, 2026<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.06em; color:var(--faint); text-align:right;\">Federal &amp; state general<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:6px 22px 18px;\">\n          <div style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--hair);\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--lake); flex:none; width:120px;\">Oct 19<\u002Fspan><span style=\"font-size:13.5px; color:var(--ink);\">Voter registration deadline (mail or online)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--hair);\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--lake); flex:none; width:120px;\">Mid-Oct<\u002Fspan><span style=\"font-size:13.5px; color:var(--ink);\">Early in-person voting begins (exact dates TBA)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; padding:12px 0; border-bottom:1px solid var(--hair);\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--lake); flex:none; width:120px;\">~Oct 20<\u002Fspan><span style=\"font-size:13.5px; color:var(--ink);\">Mail your absentee ballot at least 2 weeks out<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; padding:12px 0;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--lake); flex:none; width:120px;\">Nov 3<\u002Fspan><span style=\"font-size:13.5px; color:var(--ink); font-weight:600;\">Polls open 7 a.m. – 8 p.m.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border:1px dashed var(--hair); background:var(--panel); padding:14px 18px; margin-top:16px; display:flex; gap:22px; align-items:baseline; flex-wrap:wrap;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--cherry); flex:none;\">Quick tips<\u002Fspan>\n      <span style=\"font-size:13px; color:var(--soft); line-height:1.5;\">Absentee ballots must be <strong style=\"color:var(--ink);\">received by 8 p.m.<\u002Fstrong> on Election Day — not just postmarked. Check your registration and see your exact ballot anytime at <a href=\"https://mvic.sos.state.mi.us\" target=\"_blank\" rel=\"noopener\">mvic.sos.state.mi.us<\u002Fa>.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BALLOT / CONTROLS -->\n  <section id=\"ballot\" style=\"max-width:1200px; margin:0 auto; padding:40px 26px 10px;\">\n    <div style=\"border-left:3px solid var(--cherry); padding:4px 0 4px 20px; margin-bottom:30px; max-width:80ch;\">\n      <p style=\"font-size:20px; line-height:1.5; font-weight:600; color:var(--ink); margin:0;\">Michigan's facing a wave of data centers — and what they mean for your <b>power bill<\u002Fb>, your <b>water<\u002Fb>, and who controls your <b>zoning<\u002Fb> is on this ballot. Here's where the people who'll decide it stand.<\u002Fp>\n      <div style=\"margin-top:16px; display:inline-flex; align-items:center; gap:9px; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--pine); border:1px solid var(--pine); padding:6px 12px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:var(--pine);\"><\u002Fspan><span id=\"onrec-top\">— candidates on record<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 320px; gap:40px; align-items:end;\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--cherry); margin-bottom:10px;\">Find your ballot<\u002Fdiv>\n        <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-0.02em; margin:0 0 8px;\">Who's on the record near you<\u002Fh2>\n        <p style=\"font-size:15px; color:var(--soft); margin:0; max-width:52ch; line-height:1.5;\">Enter your ZIP to narrow to your region's races, or browse everyone below.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"display:flex; border:1px solid var(--navy);\">\n          <input id=\"zip\" type=\"text\" inputmode=\"numeric\" maxlength=\"5\" placeholder=\"e.g. 48176\" style=\"flex:1; border:none; background:var(--paper); padding:13px 14px; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink); outline:none;\">\n          <button id=\"zip-go\" style=\"border:none; background:var(--cherry); color:#fff; padding:0 18px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer;\">See my races<\u002Fbutton>\n        <\u002Fdiv>\n        <div id=\"zip-note\" style=\"display:none; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.06em; color:var(--pine); margin-top:8px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border-top:2px solid var(--navy); margin-top:26px; padding-top:18px;\">\n      <!-- Primary: race selector -->\n      <div style=\"display:flex; align-items:center; gap:14px; flex-wrap:wrap;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--faint); flex:none;\">Browse<\u002Fspan>\n        <div style=\"display:flex; gap:0; flex-wrap:wrap; border:1px solid var(--navy);\">\n          <span class=\"chip rc\" data-race=\"all\" data-active=\"1\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.09em; text-transform:uppercase; padding:9px 16px; color:var(--soft); border-right:1px solid var(--hair);\">All races<\u002Fspan>\n          <span class=\"chip rc\" data-race=\"us-senate\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.09em; text-transform:uppercase; padding:9px 16px; color:var(--soft); border-right:1px solid var(--hair);\">U.S. Senate<\u002Fspan>\n          <span class=\"chip rc\" data-race=\"governor\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.09em; text-transform:uppercase; padding:9px 16px; color:var(--soft); border-right:1px solid var(--hair);\">Governor<\u002Fspan>\n          <span class=\"chip rc\" data-race=\"legislature\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.09em; text-transform:uppercase; padding:9px 16px; color:var(--soft);\">State House &amp; Senate<\u002Fspan>\n        <\u002Fdiv>\n        <span id=\"cand-count\" style=\"margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.08em; color:var(--faint);\"><\u002Fspan>\n      <\u002Fdiv>\n      <!-- Secondary: quieter refine row -->\n      <div style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:12px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--faint); flex:none;\">Refine<\u002Fspan>\n        <div style=\"display:flex; gap:6px;\">\n          <span class=\"chip pc\" data-party=\"all\" data-active=\"1\" style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; border:1px solid var(--hair); padding:5px 11px; color:var(--soft);\">All<\u002Fspan>\n          <span class=\"chip pc\" data-party=\"Democratic\" style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; border:1px solid var(--hair); padding:5px 11px; color:var(--soft);\">Dem<\u002Fspan>\n          <span class=\"chip pc\" data-party=\"Republican\" style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; border:1px solid var(--hair); padding:5px 11px; color:var(--soft);\">Rep<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"width:1px; height:16px; background:var(--hair);\"><\u002Fspan>\n        <div style=\"display:flex; gap:6px;\">\n          <span class=\"chip xc\" data-record=\"all\" data-active=\"1\" style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; border:1px solid var(--hair); padding:5px 11px; color:var(--soft);\">All<\u002Fspan>\n          <span class=\"chip xc\" data-record=\"on\" style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; border:1px solid var(--hair); padding:5px 11px; color:var(--soft);\">On record<\u002Fspan>\n          <span class=\"chip xc\" data-record=\"none     <div style=\"display:flex; gap:6px; margin-bottom:10px;\">\n        <button id=\"dm-house\" style=\"flex:1; padding:7px 0; border:1px solid var(--navy); background:var(--navy); color:#fff; font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer;\">House<\u002Fbutton>\n        <button id=\"dm-senate\" style=\"flex:1; padding:7px 0; border:1px solid var(--navy); background:#fff; color:var(--soft); font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer;\">Senate<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"dmap\" style=\"height:340px; border:1px solid var(--navy);\"><\u002Fdiv>\n      <div style=\"margin-top:11px; font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; color:var(--soft);\">\n        <div style=\"display:flex; align-items:center; gap:6px; margin-bottom:7px;\"><span>Fewer<\u002Fspan><span style=\"flex:1; display:flex; height:11px; border:1px solid #C9D5E3;\"><span style=\"flex:1; background:#EDF1F6;\"><\u002Fspan><span style=\"flex:1; background:#CBDDF0;\"><\u002Fspan><span style=\"flex:1; background:#7FA8D4;\"><\u002Fspan><span style=\"flex:1; background:#1E6FC4;\"><\u002Fspan><span style=\"flex:1; background:#0C1E33;\"><\u002Fspan><\u002Fspan><span>More<\u002Fspan><\u002Fdiv>\n        \n      <\u002Fdiv>\n      <div style=\"margin-top:9px; font-size:10px; color:var(--faint); line-height:1.5;\">Boundaries: Michigan House (2024 remedial plan) &amp; Senate (2021 plan), State of Michigan GIS. Heat = tracked data-center projects.<\u002Fdiv>\n      <!-- editorial standard -->\n      <div style=\"border:1px solid var(--hair); background:var(--paper); padding:18px; margin-top:18px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--pine); margin-bottom:8px;\">✓ Editorial standard<\u002Fdiv>\n        <p style=\"font-size:12.5px; line-height:1.6; color:var(--soft); margin:0;\">Every quote is copied from a linked public source — news, debate, campaign site, or official statement. We do not rate or endorse candidates.<\u002Fp>\n      <\u002Fdiv>\n      <!-- sponsor -->\n      <div style=\"border:1px dashed var(--hair); background:var(--paper); padding:18px; margin-top:14px; text-align:center;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--faint); margin-bottom:10px;\">Voter guide sponsored by<\u002Fdiv>\n        <div style=\"height:30px; display:flex; align-items:center; justify-content:center; border:1px dashed var(--hair); font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--faint);\">Your logo<\u002Fdiv>\n        <a href=\"#\" style=\"display:inline-block; margin-top:10px; font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase;\">Become a sponsor →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SPOTLIGHT THE CHATTER -->\n  <section style=\"background:var(--navy); color:#fff;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:44px 26px 50px; display:grid; grid-template-columns:1fr 1.05fr; gap:44px; align-items:start;\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--copper); margin-bottom:12px;\">Heard something?<\u002Fdiv>\n        <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-0.02em; line-height:1.05; margin:0 0 14px;\">Spotlight the chatter.<\u002Fh2>\n        <p style=\"font-size:15.5px; line-height:1.6; color:#C6D6E8; margin:0 0 18px; max-width:46ch;\">Catch a candidate posting about data centers on social media, or quoted in a local story? Send it in. Every tip is checked against the original source before it ever appears on a candidate's card — no rumors, no screenshots without a link.<\u002Fp>\n        <div style=\"display:flex; gap:9px; align-items:center; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.06em; color:#7FA8D4;\"><span style=\"color:var(--pine);\">✓<\u002Fspan> Verified before publish &nbsp;·&nbsp; <span style=\"color:var(--pine);\">✓<\u002Fspan> Always linked to source<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"background:var(--paper); color:var(--ink); padding:24px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--faint); margin-bottom:14px;\">Submit what a candidate said<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <input id=\"ch-who\" type=\"text\" placeholder=\"Candidate name\" style=\"border:1px solid var(--navy); background:var(--surface); padding:12px 13px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink); outline:none;\">\n            <textarea id=\"ch-what\" rows=\"3\" placeholder=\"What did they say about data centers?\" style=\"border:1px solid var(--navy); background:var(--surface); padding:12px 13px; font-family:'Archivo',sans-serif; font-size:14px; color:var(--ink); outline:none; resize:vertical;\"><\u002Ftextarea>\n            <input id=\"ch-link\" type=\"text\" placeholder=\"Link to the post or article (required to publish)\" style=\"border:1px solid var(--navy); background:var(--surface); padding:12px 13px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink); outline:none;\">\n            <button id=\"chatter-submit\" style=\"border:none; background:var(--cherry); color:#fff; padding:13px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer;\" style-hover=\"background:var(--navy);\">Send the tip →<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:8.5px; color:var(--faint); margin-top:10px; letter-spacing:0.04em;\">We never publish a stance without a working source link.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:20px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:#7FA8D4; margin-bottom:12px;\">In the queue · awaiting source check<\u002Fdiv>\n          <div id=\"chatter-feed\">\n            <div style=\"border:1px solid #2A425E; background:#12314C; padding:16px 18px; margin-bottom:12px;\">\n              <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:8.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--copper); border:1px solid var(--copper); padding:3px 8px;\">Pending review<\u002Fspan><span style=\"font-size:14px; font-weight:800;\">Haley Stevens<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:14px; line-height:1.5; color:#DCE7F2;\">“Reader flagged a town-hall clip on data-center water use — verifying the outlet now.”<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:8.5px; color:#7FA8D4; margin-top:8px;\">Submitted by a reader · 2h ago<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- METHODOLOGY -->\n  <section id=\"methodology\" style=\"background:var(--paper); border-top:1px solid var(--hair);\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:44px 26px 52px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--cherry); margin-bottom:12px;\">How we built this<\u002Fdiv>\n      <div style=\"font-size:26px; font-weight:800; letter-spacing:-0.01em; margin-bottom:8px;\">Methodology<\u002Fdiv>\n      <div style=\"font-size:13.5px; color:var(--soft); line-height:1.6; max-width:640px; margin-bottom:26px;\">A nonpartisan record of where data centers are proposed in Michigan and what the people on your 2026 ballot have said about them. Here is exactly how it is put together.<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:26px 44px;\">\n        <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--lake); margin-bottom:9px;\">The voter guide<\u002Fdiv><p style=\"font-size:14px; line-height:1.65; color:var(--ink); margin:0;\">We track what 2026 candidates for Governor, U.S. Senate, and the state Legislature have said, on the record, about data centers. Every entry links to a public source — news coverage, a debate, a campaign statement, or an official post. We quote candidates and cite the source; we do not rate, rank, or endorse.<\u002Fp><\u002Fdiv>\n        <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--lake); margin-bottom:9px;\">The district map<\u002Fdiv><p style=\"font-size:14px; line-height:1.65; color:var(--ink); margin:0;\">Each Michigan House and Senate seat is shaded by the number of <b>active and proposed<\u002Fb> data-center projects inside its boundaries, drawn from our project tracker. Withdrawn, rejected, and cancelled proposals are excluded, so the map reflects live development pressure — not every idea ever floated. Megawatts shown on hover are the developer’s disclosed capacity; many have disclosed none.<\u002Fp><\u002Fdiv>\n        <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--lake); margin-bottom:9px;\">District boundaries<\u002Fdiv><p style=\"font-size:14px; line-height:1.65; color:var(--ink); margin:0;\">Michigan House districts use the 2024 court-ordered remedial plan; Senate districts use the 2021 Independent Citizens Redistricting Commission plan — both published by the State of Michigan GIS. Each project is matched to its district by mapped coordinates (point-in-polygon).<\u002Fp><\u002Fdiv>\n        <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--lake); margin-bottom:9px;\">Corrections<\u002Fdiv><p style=\"font-size:14px; line-height:1.65; color:var(--ink); margin:0;\">This is a living record and we will sometimes get things wrong. If a quote, source, project, or district looks off, tell us and we will fix it — corrections are logged publicly. <a href=\"corrections.html\" style=\"color:var(--lake); white-space:nowrap;\">Corrections policy →<\u002Fa><\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n  <!-- ASK EMMY (floating) -->\n  <a href=\"#ask-emmy\" aria-label=\"Ask Emmy — the tracker's assistant\" style=\"position:fixed; right:22px; bottom:22px; z-index:9999; display:flex; align-items:center; gap:10px; background:#0C1E33; color:#FFFFFF; padding:11px 16px 11px 12px; border-radius:40px; box-shadow:0 6px 24px rgba(12,30,51,0.28); text-decoration:none;\">\n    <span style=\"width:30px; height:30px; flex:none; border-radius:50%; overflow:hidden; background:#1E6FC4;\"><img src=\"0b90cbf7-c739-4c4b-83e5-1502480a0a41\" alt=\"Emmy\" style=\"width:100%; height:100%; border-radius:50%; object-fit:cover; display:block;\"><\u002Fspan>\n    <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase;\">Ask Emmy<\u002Fspan>\n    <span style=\"width:7px; height:7px; border-radius:50%; background:#1E8E52;\"><\u002Fspan>\n  <\u002Fa>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{}\">\nclass Component extends DCLogic {\n  state = { race:\"all\", party:\"all\", region:null, record:\"all\", sort:\"onrec\" };\n\n  componentDidMount() {\n    this.data = this._data();\n    const _leg = this.data.find(r => r.id === \"legislature\"); if (_leg && _leg.districts) _leg.candidates = _leg.districts.flatMap(d => d.candidates);\n    const LK = this._links(); this.data.forEach(r => r.candidates.forEach(c => { c.links = LK[c.name] || []; }));\n    const safe = fn => { try { fn(); } catch (e) { console.error(\"[election] section failed:\", e); } };\n    safe(() => this._wire());\n    safe(() => this._wireNav());\n    safe(() => this._render());\n    safe(() => this._renderDash());\n    safe(() => this._renderBracket(\"governor\"));\n    safe(() => this._wireBracket());\n    safe(() => this._wireChatter());\n    safe(() => this._countdown());\n    this._cdIv = setInterval(() => safe(() => this._countdown()), 60000);\n    safe(() => this._boot(0));\n    safe(() => this._wireDmTabs());\n  }\n  componentWillUnmount() { if (this.map) { this.map.remove(); this.map = null; } if (this._cdIv) clearInterval(this._cdIv); }\n\n  _countdown() {\n    const now = new Date();\n    const days = (iso) => Math.max(0, Math.ceil((new Date(iso + \"T20:00:00\") - now) / 86400000));\n    const p = days(\"2026-08-04\"), g = days(\"2026-11-03\");\n    [\"cd-primary\", \"cd-top-p\"].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = p; });\n    [\"cd-general\", \"cd-top-g\"].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = g; });\n  }\n\n  _data() {\n    return [\n      { id:\"governor\", title:\"Governor\", sub:\"Open seat \\u00b7 Primary Aug 4 \\u00b7 General Nov 3, 2026\", region:\"statewide\", candidates:[\n        { name:\"Jocelyn Benson\", finance:\"https://www.transparencyusa.org/mi/candidate/jocelyn-benson-can\", photo:\"img/candidates/jocelyn-benson.jpg\", photoCredit:\"Michigan Department of State\", party:\"Democratic\", role:\"Governor candidate \\u00b7 Secretary of State\", stances:[ { kind:\"finance\", quote:\"Her husband, Ryan Friedrichs, is a vice president at Related, developer of the Saline \\u201cStargate\\u201d data center; the campaign says he will recuse from state matters if she is elected.\", source:\"Michigan Advance\", date:\"Nov 14, 2025\", context:\"Michigan Advance\", url:\"https://michiganadvance.com/2025/11/14/bensons-husband-to-recuse-from-state-work-on-controversial-data-center-if-she-is-elected-governor/\" }, { topic:\"Data centers\", quote:\"Data centers [can] come to Michigan only if they can improve and deliver prosperity, well-paying union jobs, and affordable, low energy costs for our residents.\", source:\"Benson campaign\", date:\"Jan 8, 2026\", context:\"Benson campaign / WJR interview\", url:\"https://www.jocelynbenson.com/issues/data-centers\" } ] },\n        { name:\"Chris Swanson\", finance:\"https://www.transparencyusa.org/mi/candidate/chris-swanson\", photo:\"img/candidates/chris-swanson.jpg\", photoCredit:\"Ballotpedia\", party:\"Democratic\", role:\"Governor candidate \\u00b7 Genesee County Sheriff\", stances:[ { kind:\"finance\", quote:\"Pledges to refuse data-center money and DTE and Consumers Energy PAC contributions.\", source:\"Bridge Michigan\", date:\"Feb 2026\", context:\"Campaign / Bridge Michigan\", url:\"https://bridgemi.com/michigan-government/where-michigan-gubernatorial-candidates-stand-on-data-centers/\" }, { topic:\"Data centers\", quote:\"Michigan is an attractive location for companies to locate... [but] this should not come at the expense of our residents.\", source:\"Bridge Michigan\", date:\"Feb 2, 2026\", context:\"Statement to Bridge Michigan\", url:\"https://bridgemi.com/michigan-government/where-michigan-gubernatorial-candidates-stand-on-data-centers/\" } ] },\n        { name:\"John James\", finance:\"https://www.transparencyusa.org/mi/candidate/john-james\", photo:\"img/candidates/john-james.jpg\", photoCredit:\"Wikimedia Commons\", party:\"Republican\", role:\"Governor candidate \\u00b7 U.S. Rep (MI-10)\", stances:[ { kind:\"finance\", quote:\"Received about $107,300 from executives and family of Walbridge, the construction firm building major Michigan data centers \\u2014 as rivals attacked him over data-center money at the July debate.\", source:\"Bridge Michigan\", date:\"Jul 2026\", context:\"Bridge Michigan fact-check\", url:\"https://bridgemi.com/michigan-government/fact-check-gop-rivals-attack-john-james-in-gubernatorial-debate/\" }, { topic:\"Data centers\", quote:\"We have to diversify Michigan\\u2019s economy. Data centers are just one tool, but they\\u2019re not the whole plan.\", source:\"Bridge Michigan\", date:\"Feb 2, 2026\", context:\"Bridge Michigan\", url:\"https://bridgemi.com/michigan-government/where-michigan-gubernatorial-candidates-stand-on-data-centers/\" } ] },\n        { name:\"Mike Cox\", finance:\"https://www.transparencyusa.org/mi/candidate/mike-cox\", photo:\"img/candidates/mike-cox.jpg\", photoCredit:\"Ballotpedia\", party:\"Republican\", role:\"Governor candidate \\u00b7 Former Attorney General\", stances:[ { topic:\"Data centers\", quote:\"My position is simple: clear standards, local control, no special treatment, and projects must benefit Michigan families, not burden them.\", source:\"Bridge Michigan\", date:\"Feb 2, 2026\", context:\"Statement to Bridge Michigan\", url:\"https://bridgemi.com/michigan-government/where-michigan-gubernatorial-candidates-stand-on-data-centers/\" } ] },\n        { name:\"Perry Johnson\", finance:\"https://www.transparencyusa.org/mi/candidate/perry-johnson\", photo:\"img/candidates/perry-johnson.jpg\", photoCredit:\"Wikimedia Commons\", party:\"Republican\", role:\"Governor candidate\", stances:[ { topic:\"Data centers\", quote:\"Communities cannot afford the pressures of massive data centers... [I would] end the massive tax break that wealthy out-of-state data center companies currently receive.\", source:\"Bridge Michigan\", date:\"Feb 2, 2026\", context:\"Bridge Michigan\", url:\"https://bridgemi.com/michigan-government/where-michigan-gubernatorial-candidates-stand-on-data-centers/\" } ] },\n        { name:\"Aric Nesbitt\", finance:\"https://www.transparencyusa.org/mi/candidate/aric-nesbitt-can\", photo:\"img/candidates/aric-nesbitt.jpg\", photoCredit:\"Wikimedia Commons\", party:\"Republican\", role:\"Governor candidate \\u00b7 Campaign suspended\", stances:[ { topic:\"Data centers\", quote:\"Data centers can have a place in Michigan\\u2019s future \\u2014 provided they meet airtight conditions to protect our residents, lower the cost of energy for everybody, and protect our natural beauty.\", source:\"Bridge Michigan\", date:\"Feb 2, 2026\", context:\"Bridge Michigan \\u00b7 voted against 2024 tax breaks\", url:\"https://bridgemi.com/michigan-government/where-michigan-gubernatorial-candidates-stand-on-data-centers/\" } ] }\n      ]},\n      { id:\"us-senate\", title:\"U.S. Senate\", sub:\"Open seat \\u00b7 Primary Aug 4 \\u00b7 General Nov 3, 2026\", region:\"statewide\", candidates:[\n        { name:\"Abdul El-Sayed\", finance:\"https://www.fec.gov/data/candidate/S6MI00418/\", photo:\"img/candidates/abdul-el-sayed.jpg\", photoCredit:\"Ballotpedia\", party:\"Democratic\", role:\"U.S. Senate candidate\", stances:[ { kind:\"finance\", quote:\"Refuses corporate PAC and super-PAC money and runs on small-dollar donations (an anti-AIPAC super PAC has said it will spend for him independently).\", source:\"JTA\", date:\"Jul 7, 2026\", context:\"Jewish Telegraphic Agency\", url:\"https://www.jta.org/2026/07/07/politics/abdul-el-sayed-has-refused-super-pac-funding-an-anti-aipac-pac-says-it-will-spend-for-him-anyway\" }, { topic:\"Data centers\", quote:\"Data centers must pay for their own energy demand \\u2014 costs cannot be passed onto ratepayers.\", source:\"Abdul for U.S. Senate\", date:\"Jan 8, 2026\", context:\"Campaign: Terms of Engagement for Data Centers\", url:\"https://abdulforsenate.com/2026/01/datacenters/\" } ] },\n        { name:\"Haley Stevens\", finance:\"https://www.fec.gov/data/candidate/S6MI00426/\", photo:\"img/candidates/haley-stevens.jpg\", photoCredit:\"U.S. House (public domain)\", party:\"Democratic\", role:\"U.S. Senate candidate \\u00b7 U.S. Rep (MI-11)\", stances:[ { kind:\"finance\", quote:\"Boosted by heavy outside spending, including the AIPAC-affiliated United Democracy Project (about $2.3M reported) in the Senate primary.\", source:\"The Detroit News\", date:\"May 27, 2026\", context:\"The Detroit News\", url:\"https://www.detroitnews.com/story/news/politics/2026/05/27/aipac-loophole-back-haley-stevens-michigan-democratic-senate-primary/90251902007/\" }, { topic:\"Data centers & AI\", kind:\"position\", quote:\"Agreed data-center projects should include community benefit agreements and that residents deserve a voice in the decisions; on AI, cited her 2020 AI law and called for equitable investment and consumer-privacy protections.\", source:\"WDIV Local 4\", date:\"Jul 8, 2026\", context:\"WDIV Local 4 Democratic Senate debate\", url:\"https://www.clickondetroit.com/news/local/2026/07/08/michigan-us-senate-candidates-haley-stevens-abdul-el-sayed-clash-in-democratic-debate/\" } ] },\n        { name:\"Mallory McMorrow\", finance:\"https://www.fec.gov/data/candidate/S6MI00392/\", photo:\"img/candidates/mallory-mcmorrow.jpg\", photoCredit:\"Wikimedia Commons\", party:\"Democratic\", role:\"U.S. Senate candidate \\u00b7 State Senator (SD-8) \\u00b7 Campaign suspended\", stances:[ { topic:\"Data centers\", quote:\"Data center companies, not Michigan families, should pay for their own energy [and] grid upgrades... pay their fair share in taxes... and pay our workers by creating good-paying union jobs.\", source:\"McMorrow campaign\", date:\"2026\", context:\"Campaign: Data Centers Done Right\", url:\"https://www.mcmorrowformichigan.com/data-centers-done-right\" } ] },\n        { name:\"Mike Rogers\", finance:\"https://www.fec.gov/data/candidate/S4MI00595/\", photo:\"img/candidates/mike-rogers.jpg\", photoCredit:\"Wikimedia Commons\", party:\"Republican\", role:\"U.S. Senate candidate \\u00b7 Former U.S. Rep\", stances:[] }\n      ]},\n      { id:\"legislature\", title:\"State House & Senate\", sub:\"Seats where data centers are proposed \\u00b7 Primary Aug 4\", region:\"districts\", districts:[\n        { name:\"Michigan House District 31\", meta:\"Open seat &middot; Western Wayne County\", summary:\"Open seat &mdash; Rep. Reggie Miller is retiring. The district covers western Wayne County, including Van Buren Township, where Google has proposed a roughly 1-gigawatt data center (&ldquo;Project Cannoli&rdquo;) on ~280 acres near Belleville, pending a state wetland permit. It also takes in Augusta Township&rsquo;s approved Thor Equities campus and the proposed Dundee Township site.\", candidates:[\n          { name:\"Shannon Wayne\", finance:\"https://mi-boe.entellitrak.com/etk-mi-boe-prod/page.request.do?page=page.miboeContributionPublicSearch\", photo:\"img/candidates/shannon-wayne.jpg\", photoCredit:\"Shannon Dare Wayne campaign\", party:\"Democratic\", role:\"\", reg:\"SE Michigan\", stances:[] },\n          { name:\"Laura Perry\", finance:\"https://www.transparencyusa.org/mi/candidate/laura-perry\", photo:\"img/candidates/laura-perry.jpg\", photoCredit:\"Laura Perry campaign\", party:\"Republican\", role:\"\", reg:\"SE Michigan\", stances:[] }\n        ] },\n        { name:\"Michigan House District 33\", meta:\"Ann Arbor / Saline &middot; Washtenaw County\", summary:\"Home to the state&rsquo;s highest-profile data-center fight: the Saline Township &ldquo;Stargate&rdquo; campus (Related Digital with Oracle and OpenAI), a ~1,400 MW project now under construction, plus a proposed York Township site. Incumbent Morgan Foreman authored HB 6140 (NDA transparency) in the House Democrats&rsquo; guardrails package; her Republican challenger withdrew.\", candidates:[\n          { name:\"Morgan Foreman\", finance:\"https://www.transparencyusa.org/mi/candidate/morgan-foreman\
