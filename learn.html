  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    var msg = e.message || '';
    if (!msg && e.target && /^(SCRIPT|LINK|IMG|VIDEO)$/.test(e.target.tagName || '')) return;
    if (!msg && e.type === 'error') return;
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (msg || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<base href=\"/mi-data-center-tracker/\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script>\n(function(){try{var t=localStorage.getItem('mdct-theme');if(t==='light'||t==='dark')document.documentElement.dataset.theme=t;}catch(e){}})();\n<\u002Fscript>\n<script src=\"/mi-data-center-tracker/theme.js\"><\u002Fscript>\n<script src=\"/mi-data-center-tracker/content-data.js\"><\u002Fscript>\n<script src=\"/mi-data-center-tracker/mdct-editorial.js\"><\u002Fscript>\n<script src=\"17728b1c-fb28-4efe-af41-877f3597c487\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap\" rel=\"stylesheet\">\n<link rel=\"icon\" href=\"assets/mark.svg\" type=\"image/svg+xml\">\n<link rel=\"stylesheet\" href=\"/mi-data-center-tracker/theme.css\">\n<link rel=\"apple-touch-icon\" href=\"assets/mark.svg\">\n<meta name=\"theme-color\" content=\"#100f0e\">\n<title>Learn \u2014 Michigan Data Center Tracker<\u002Ftitle>\n<meta name=\"description\" content=\"Plain-English explainers on data centers, megawatts, moratoria, and special-rate contracts in Michigan.\">\n<meta property=\"og:type\" content=\"website\">\n<meta property=\"og:title\" content=\"Learn \u2014 Michigan Data Center Tracker\">\n<meta property=\"og:description\" content=\"Plain-English explainers on data centers, megawatts, moratoria, and special-rate contracts in Michigan.\">\n<meta property=\"og:image\" content=\"assets/mark.svg\">\n<meta name=\"twitter:card\" content=\"summary_large_image\">\n<meta name=\"twitter:title\" content=\"Learn \u2014 Michigan Data Center Tracker\">\n<meta name=\"twitter:description\" content=\"Plain-English explainers on data centers, megawatts, moratoria, and special-rate contracts in Michigan.\">\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { background: #100f0e; -webkit-font-smoothing: antialiased; color: #f4f1ee; font-family: 'Archivo', sans-serif; }\n  a { color: inherit; }\n  .navlink { position: relative; color: #9b9794; text-decoration: none; transition: color .18s ease; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; font-size: 14px; }\n  .navlink:hover { color: #f4f1ee; }\n  .navlink::after { content: \"\"; position: absolute; left: 0; right: 100%; bottom: -7px; height: 2px; background: #E03131; transition: right .22s ease; }\n  .navlink:hover::after { right: 0; }\n  .navlink.is-active { color: #f4f1ee; }\n  .navlink.is-active::after { right: 0; }\n  .cta { transition: background .18s ease, transform .18s ease; }\n  .cta:hover { background: #f24343; transform: translateY(-1px); }\n  .flink { color:#8c8884; text-decoration:none; transition: color .15s ease; }\n  .flink:hover { color:#e7e3df; }\n  .lockup { display:inline-flex; align-items:center; line-height:1; text-decoration:none; }\n  .lockup .mark { height:1.3em; width:auto; display:block; }\n  .lockup .divider { width:2px; align-self:stretch; background:#E03131; margin:.12em .5em .12em .28em; border-radius:0; }\n  .lockup .words { display:flex; flex-direction:column; justify-content:center; }\n  .lockup .mi { font-family:'Archivo',sans-serif; font-weight:800; font-size:1em; letter-spacing:.035em; color:#f6f4f1; line-height:.92; }\n  .lockup .rule { height:2px; background:#E03131; margin:.14em 0 .1em; border-radius:0; }\n  .lockup .sub { font-family:'Archivo',sans-serif; font-weight:600; font-size:.30em; letter-spacing:.30em; color:#f6f4f1; white-space:nowrap; }\n  .site-header { display:flex; align-items:center; justify-content:space-between; height:88px; padding:0 44px; background:#16140f; border-bottom:1px solid #221f1b; position:s er\">\n    <div style=\"display:flex;flex-direction:column;gap:8px;align-items:flex-start;\"><a class=\"lockup\" href=\"index.html\" style=\"font-size:30px;\"><img class=\"mark\" src=\"assets/mark.svg\" alt=\"Michigan Data Center Tracker logo\" /><span class=\"divider\"><\u002Fspan><span class=\"words\"><span class=\"mi\">MICHIGAN<\u002Fspan><span class=\"rule\"><\u002Fspan><span class=\"sub\">DATA CENTER TRACKER<\u002Fspan><\u002Fspan><\u002Fa><a href=\"https://grahamandgold.com\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Space Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:#56524e;text-decoration:none;\" onmouseover=\"this.style.color='#8c8884'\" onmouseout=\"this.style.color='#56524e'\">Powered by Graham & Gold<\u002Fa><\u002Fdiv>\n    <nav class=\"desktop-nav\" style=\"display:flex;align-items:center;gap:28px;\">\n      <a class=\"navlink\" href=\"index.html\">Home<\u002Fa>\n      <a class=\"navlink\" href=\"map/\">Live Map<\u002Fa>\n      <a class=\"navlink\" href=\"stories.html\">Stories<\u002Fa>\n      <a class=\"navlink\" href=\"meetings.html\">Meetings<\u002Fa>\n      <a class=\"navlink is-active\" href=\"learn.html\">Learn<\u002Fa>\n      <a class=\"cta\" href=\"sponsor.html\" style=\"text-decoration:none;color:#100f0e;background:#E03131;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.04em;padding:11px 19px;border-radius:0;\">Sponsor<\u002Fa>\n    <\u002Fnav>\n    <button type=\"button\" class=\"mdct-theme-btn\" aria-label=\"Switch to light mode\" aria-pressed=\"false\" title=\"Switch to light mode\"><span class=\"mdct-theme-icon\" aria-hidden=\"true\">\u2600<\u002Fspan><span class=\"mdct-theme-label\">Light<\u002Fspan><\u002Fbutton>\n      <button class=\"hamburger\" onClick=\"{{ toggleMenu }}\" aria-label=\"Menu\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fbutton>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:60;background:rgba(12,11,10,.97);padding:24px 20px;display:flex;flex-direction:column;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;\">\n        <span class=\"lockup\" style=\"font-size:20px;\"><img class=\"mark\" src=\"assets/mark.svg\" alt=\"Michigan Data Center Tracker logo\" /><span class=\"divider\"><\u002Fspan><span class=\"words\"><span class=\"mi\">MICHIGAN<\u002Fspan><span class=\"rule\"><\u002Fspan><span class=\"sub\">DATA CENTER TRACKER<\u002Fspan><\u002Fspan><\u002Fspan>\n        <button onClick=\"{{ toggleMenu }}\" aria-label=\"Close\" style=\"background:none;border:none;color:#cbc7c3;font-size:30px;cursor:pointer;line-height:1;\">\u00d7<\u002Fbutton>\n      <\u002Fdiv>\n      <nav style=\"display:flex;flex-direction:column;gap:4px;\">\n        <a href=\"index.html\" style=\"text-decoration:none;color:#cbc7c3;font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:30px;padding:13px 0;border-bottom:1px solid #1a1813;\">Home<\u002Fa>\n        <a href=\"map/\" style=\"text-decoration:none;color:#cbc7c3;font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:30px;padding:13px 0;border-bottom:1px solid #1a1813;\">Live Map<\u002Fa>\n        <a href=\"stories.html\" style=\"text-decoration:none;color:#cbc7c3;font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:30px;padding:13px 0;border-bottom:1px solid #1a1813;\">Stories<\u002Fa>\n        <a href=\"meetings.html\" style=\"text-decoration:none;color:#cbc7c3;font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:30px;padding:13px 0;border-bottom:1px solid #1a1813;\">Meetings<\u002Fa>\n        <a href=\"learn.html\" style=\"text-decoration:none;color:#f4f1ee;font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:30px;padding:13px 0;border-bottom:1px solid #1a1813;\">Learn<\u002Fa>\n        <a href=\"sponsor.html\" style=\"text-decoration:none;color:#100f0e;background:#E03131;font-weight:700;text-align:center;font-size:16px;text-transform:uppercase;letter-spacing:.04em;padding:15px;border-radius:0;margin-top:20px;\">Sponsor the tracker<\u002Fa>\n        <a href=\"https://grahamandgold.com\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;color:#9b9794;font-family:'Space Mono',monospace;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:16px 0 0;\">Powered by Graham & Gold \u2197<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- intro -->\n  <div class=\"wrap\" style=\"padding-top:56px;padding-bottom:8px;\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#E03131;margin-bottom:16px;\">Plain-English explainers<\u002Fdiv>\n    <h1 style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:clamp(40px,7vw,64px);line-height:.98;margin:0 0 14px;\">LEARN<\u002Fh1>\n    <p style=\"max-width:720px;margin:0 0 14px;color:#cbc7c3;font-size:15px;line-height:1.6;padding:12px 16px;border:1px solid #2b2824;background:#16140f;\">We are a transparent aggregator. We rewrite all headlines in our own words and always link to the original sources.<\u002Fp>\n    <p style=\"max-width:600px;margin:0;color:#a39e99;font-size:17px;line-height:1.6;\">Data centers come with their own jargon \u2014 megawatts, moratoria, special-rate contracts. Start here. No engineering degree required.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- explainer cards -->\n  <div class=\"wrap\" style=\"padding-top:40px;\">\n    <div class=\"grid3\">\n      <sc-for list=\"{{ guides }}\" as=\"g\" hint-placeholder-count=\"6\">\n        <a class=\"ecard\" href=\"#\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:#E03131;margin-bottom:14px;\">{{ g.num }}<\u002Fdiv>\n          <h3 style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:23px;line-height:1.06;margin:0 0 10px;color:#f4f1ee;\">{{ g.title }}<\u002Fh3>\n          <p style=\"margin:0 0 18px;color:#8c8884;font-size:14px;line-height:1.55;flex:1;\">{{ g.dek }}<\u002Fp>\n          <span class=\"ec-arrow\" style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.05em;color:#cbc7c3;\">Read \u2192<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- glossary -->\n  <div class=\"wrap\" style=\"padding-top:60px;\">\n    <h2 style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:30px;margin:0 0 6px;color:#f4f1ee;\">The glossary<\u002Fh2>\n    <p style=\"margin:0 0 24px;color:#8c8884;font-size:15px;\">The terms you'll hear at every hearing.<\u002Fp>\n    <div class=\"grid2\">\n      <sc-for list=\"{{ terms }}\" as=\"t\" hint-placeholder-count=\"6\">\n        <div style=\"border:1px solid #221f1b;border-radius:0;background:#16140f;padding:20px 22px;\">\n          <div style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:20px;color:#f4f1ee;margin-bottom:6px;\">{{ t.term }}<\u002Fdiv>\n          <div style=\"font-size:14px;color:#a39e99;line-height:1.55;\">{{ t.def }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ask a question (moved from homepage) -->\n  <div class=\"wrap\" style=\"padding-top:60px;padding-bottom:72px;\">\n    <div style=\"border:1px solid #2b2824;border-radius:0;background:radial-gradient(130% 150% at 0% 0%, #241f18 0%, #16140f 55%);padding:40px;\">\n      <div style=\"max-width:600px;\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#E03131;\">Ask the tracker<\u002Fspan>\n        <h3 style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:32px;line-height:1.02;margin:14px 0 12px;color:#f6f3f0;\">What can we help explain?<\u002Fh3>\n        <p style=\"margin:0 0 24px;color:#a39e99;font-size:15.5px;line-height:1.6;\">Confused about a proposal in your town? Send us the question. We answer the most common ones in our explainers and the daily briefing.<\u002Fp>\n        <sc-if value=\"{{ qPending }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:12px;\">\n            <textarea placeholder=\"e.g. Will the Mundy Township campus raise my electric bill?\" rows=\"3\" style=\"width:100%;background:#0f0e0d;border:1px solid #322e29;border-radius:0;padding:14px;color:#f4f1ee;font-family:'Archivo',sans-serif;font-size:15px;line-height:1.5;outline:none;resize:vertical;\" style-focus=\"border-color:#E03131;\"><\u002Ftextarea>\n            <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n              <input type=\"email\" placeholder=\"Email (so we can reply)\" style=\"flex:1 1 240px;min-width:0;background:#0f0e0d;border:1px solid #322e29;border-radius:0;padding:0 14px;height:50px;color:#f4f1ee;font-family:'Archivo',sans-serif;font-size:15px;outline:none;\" style-focus=\"border-color:#E03131;\" />\n              <button type=\"button\" onClick=\"{{ submitQuestion }}\" class=\"cta\" style=\"flex-shrink:0;border:none;cursor:pointer;color:#100f0e;background:#E03131;font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;padding:0 26px;height:50px;border-radius:0;\">Send question<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ qDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:center;gap:10px;min-height:50px;font-size:16px;color:#9bc49b;\"><span style=\"width:26px;height:26px;border-radius:50%;background:rgba(120,170,120,.16);color:#9bc49b;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;\">\u2713<\u002Fspan>Thanks \u2014 we read every question and reply to most.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <footer style=\"padding:48px 44px 32px;background:#0c0b0a;border-top:1px solid #221f1b;\">\n    <div style=\"max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap;\">\n      <div style=\"max-width:320px;\">\n        <span class=\"lockup\" style=\"font-size:22px;\"><img class=\"mark\" src=\"assets/mark.svg\" alt=\"Michigan Data Center Tracker logo\" /><span class=\"divider\"><\u002Fspan><span class=\"words\"><span class=\"mi\">MICHIGAN<\u002Fspan><span class=\"rule\"><\u002Fspan><span class=\"sub\">DATA CENTER TRACKER<\u002Fspan><\u002Fspan><\u002Fspan>\n        <p style=\"color:#6f6b67;font-size:13px;line-height:1.6;margin:14px 0 0;\">A public-interest record of Michigan's data center buildout. Sourced, cited, and corrected in the open.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:56px;flex-wrap:wrap;\">\n        <div style=\"display:flex;flex-direction:column;gap:11px;\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5f5b57;margin-bottom:3px;\">Explore<\u002Fspan>\n          <a class=\"flink\" href=\"map/\" style=\"font-size:14px;\">Live Map<\u002Fa>\n          <a class=\"flink\" href=\"stories.html\" style=\"font-size:14px;\">Stories<\u002Fa>\n          <a class=\"flink\" href=\"meetings.html\" style=\"font-size:14px;\">Meetings<\u002Fa>\n          <a class=\"flink\" href=\"learn.html\" style=\"font-size:14px;\">Learn<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5f5b57;margin-bottom:3px;\">About<\u002Fspan>\n          <a class=\"flink\" href=\"learn.html\" style=\"font-size:14px;\">Methodology<\u002Fa>\n          <a class=\"flink\" href=\"learn.html\" style=\"font-size:14px;\">Sources<\u002Fa>\n          <a class=\"flink\" href=\"sponsor.html\" style=\"font-size:14px;\">Sponsor<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1080px;margin:34px auto 0;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;padding-top:20px;border-top:1px solid #1a1813;\">\n      <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#7d7975;\">Independent \u00b7 Nonpartisan \u00b7 <span style=\"color:#9b9794;\">AI-drafted \u00b7 every source linked<\u002Fspan><\u002Fspan>\n      <span style=\"font-size:12px;color:#5f5b57;\">Powered by <a href=\"https://grahamandgold.com\" target=\"_blank\" rel=\"noopener\" style=\"color:#E03131;text-decoration:none;font-weight:700;\">Graham &amp; Gold<\u002Fa> \u00b7 \u00a9 2026 Michigan Data Center Tracker<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script>\nclass Component extends DCLogic {\n  state = { menuOpen: false, qPending: true, qDone: false };\n\n  renderVals() {\n    const s = this.state;\n    const guides = [\n      { num: '01', title: 'What is a data center, really?', dek: 'Warehouses full of computers \u2014 and why the ones coming to Michigan are an order of magnitude bigger than what came before.' },\n      { num: '02', title: 'Megawatts, explained', dek: 'A 600 MW campus can draw as much power as a mid-sized city. Here\\u2019s how to picture what that means for the grid.' },\n      { num: '03', title: 'Why do they need so much water?', dek: 'Cooling. We break down evaporative vs. closed-loop systems and what a withdrawal permit actually allows.' },\n      { num: '04', title: 'Who pays for the power?', dek: 'Special-rate contracts, ratepayer impact, and the question at the center of every hearing: will my bill go up?' },\n      { num: '05', title: 'Moratoria & zoning tools', dek: 'Pause, interim moratorium, special-use conversion \u2014 the legal levers townships are pulling, in plain English.' },\n      { num: '06', title: 'How we source the tracker', dek: 'Every figure traces to a public filing or official notice. Our methodology, corrections policy, and how to flag an error.' },\n    ];\n    const terms = [\n      { term: 'Megawatt (MW)', def: 'A unit of power. One large data center campus can be hundreds of MW \u2014 comparable to a small city\\u2019s peak demand.' },\n      { term: 'Interconnection', def: 'The approval and physical hookup that lets a facility draw from the grid. Often the longest part of the timeline.' },\n      { term: 'Special-rate contract', def: 'A custom electricity deal between a utility and a single large customer, subject to regulator approval.' },\n      { term: 'Moratorium', def: 'A temporary local ban on new approvals while a community writes or updates its zoning rules.' },\n      { term: 'Tax abatement', def: 'A reduction in property taxes offered to attract investment \u2014 central to the jobs-vs-subsidy debate.' },\n      { term: 'Withdrawal permit', def: 'State authorization to draw a set volume of water per day, reviewed by EGLE in Michigan.' },\n    ];\n    return {\n      menuOpen: s.menuOpen,\n      toggleMenu: () => this.setState(p => ({ menuOpen: !p.menuOpen })),\n      guides, terms,\n      qPending: s.qPending, qDone: s.qDone,\n      submitQuestion: () => this.setState({ qPending: false, qDone: true }),\n    };\n  }\n}\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
  </script>
