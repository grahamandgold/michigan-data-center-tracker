name: Agenda investigator (tonight & tomorrow)

on:
  schedule:
    - cron: "30 20 * * *"   # 4:30 PM ET — preview tonight's meetings
    - cron: "45 9 * * *"    # 5:45 AM ET — fresh intel before the 7 AM newsletter
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: agenda-scout
  cancel-in-progress: false

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install extraction stack (PDF text, PDF rendering, headless browser)
        run: |
          pip install pypdf pypdfium2 pillow playwright
          python -m playwright install chromium --with-deps

      - name: Investigate agendas (portals, packets, scanned PDFs, background)
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || '' }}
        run: python scripts/agenda_scout.py

      - name: Commit if changed
        run: |
          if git status --porcelain live-data-pending.json agenda-brief.json | grep -q .; then
            git config user.name "agenda-scout"
            git config user.email "agenda-scout@users.noreply.github.com"
            git add live-data-pending.json agenda-brief.json
            git commit -m "Agenda intel $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          else
            echo "No agenda intel this run."
          fi
