name: Hourly wire refresh (Grok agent)

on:
  schedule:
    - cron: "15 * * * *"   # every hour at :15 UTC
  workflow_dispatch: {}     # manual run button

permissions:
  contents: write

concurrency:
  group: wire-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Grok wire agent
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || 'grok-4' }}
        run: python scripts/wire_agent.py

      - name: Verify headline accuracy against sources
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || 'grok-4' }}
        run: python scripts/headline_check.py

      - name: Commit if changed
        run: |
          if git status --porcelain live-data.json live-data-pending.json | grep -q .; then
            git config user.name "grok-wire-agent"
            git config user.email "wire-agent@users.noreply.github.com"
            git add live-data.json live-data-pending.json
            git commit -m "Wire: file to desk queue $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          else
            echo "No changes — skipping commit."
          fi
