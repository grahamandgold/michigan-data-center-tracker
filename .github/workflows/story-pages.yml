name: Story pages (SEO snapshots)

on:
  push:
    branches: [main]
    paths: ["live-data.json"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: story-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render static story pages + sitemap
        run: python scripts/build_story_pages.py

      - name: Commit if changed
        run: |
          if git status --porcelain stories/pages sitemap-stories.xml | grep -q .; then
            git config user.name "story-pages"
            git config user.email "story-pages@users.noreply.github.com"
            git add stories/pages sitemap-stories.xml
            git commit -m "SEO: refresh static story pages"
            git pull --rebase origin main
            git push
          else
            echo "No change."
          fi
