<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Moratorium Wave — Michigan Data Center Tracker</title>
<meta name="description" content="Watch 32+ Michigan communities pause data-center development, month by month. Computed live from the Michigan Data Center Tracker's public dataset.">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#121110; --panel:#1a1918; --ink:#f5f1ea; --muted:#8a847c; --red:#d92b2b; --line:#2b2927; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); font-family:Archivo,sans-serif; padding:16px; }
  .kicker { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.18em; color:var(--red); text-transform:uppercase; }
  h1 { font-family:'Saira Condensed',sans-serif; font-weight:800; font-size:clamp(22px,4vw,34px); text-transform:uppercase; letter-spacing:.02em; margin:4px 0 2px; }
  .sub { color:var(--muted); font-size:13px; max-width:640px; }
  .stage { position:relative; margin:14px 0 6px; background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  svg { display:block; width:100%; height:auto; }
  .hud { position:absolute; top:12px; left:14px; }
  .hud .count { font-family:'Saira Condensed',sans-serif; font-weight:800; font-size:56px; line-height:1; color:var(--red); }
  .hud .lbl { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; }
  .hud .month { font-family:'Space Mono',monospace; font-size:14px; color:var(--ink); margin-top:6px; }
  .controls { display:flex; gap:10px; align-items:center; margin-top:10px; }
  button { font-family:'Space Mono',monospace; font-size:12px; background:var(--red); color:#fff; border:0; border-radius:4px; padding:8px 14px; cursor:pointer; }
  button.ghost { background:transparent; color:var(--muted); border:1px solid var(--line); }
  input[type=range] { flex:1; accent-color:var(--red); }
  .bars { display:flex; align-items:flex-end; gap:3px; height:54px; margin-top:12px; }
  .bars .b { flex:1; background:#3a3734; border-radius:2px 2px 0 0; position:relative; min-height:2px; transition:background .2s; }
  .bars .b.on { background:var(--red); }
  .bars .b span { position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); font-family:'Space Mono',monospace; font-size:8px; color:var(--muted); white-space:nowrap; }
  .foot { margin-top:26px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; font-size:12px; color:var(--muted); }
  .foot a { color:var(--ink); }
  .embed-box { display:none; margin-top:10px; background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:10px; }
  .embed-box code { font-family:'Space Mono',monospace; font-size:11px; color:var(--ink); word-break:break-all; display:block; }
  .tip { position:absolute; pointer-events:none; background:#000; border:1px solid var(--line); border-radius:4px; padding:6px 8px; font-size:11px; max-width:230px; display:none; z-index:5; }
  .tip b { display:block; font-size:12px; }
  .tip .d { color:var(--muted); }
</style>
</head>
<body>
<div class="kicker">Tracking the public record · Live data</div>
<h1>The Moratorium Wave</h1>
<div class="sub" id="sub">Michigan communities pausing data-center development, month by month — every pause sourced to a public record.</div>

<div class="stage">
  <div class="hud">
    <div class="count" id="count">0</div>
    <div class="lbl">Communities paused</div>
    <div class="month" id="month">—</div>
  </div>
  <svg id="map" viewBox="0 0 760 640" role="img" aria-label="Animated map of Michigan data center moratoria over time"></svg>
  <div class="tip" id="tip"></div>
</div>

<div class="controls">
  <button id="play">▶ Play</button>
  <input type="range" id="slider" min="0" max="0" value="0" step="1" aria-label="Timeline">
  <button class="ghost" id="embedBtn">&lt;/&gt; Embed</button>
</div>
<div class="bars" id="bars"></div>
<div class="embed-box" id="embedBox">
  <code id="embedCode"></code>
  <button style="margin-top:8px" id="copyBtn">Copy embed code</button>
</div>

<div class="foot">
  <div>Source: <a href="https://grahamandgold.github.io/mi-data-center-tracker/map.html" target="_blank" rel="noopener">Michigan Data Center Tracker</a> — free to embed with this credit.</div>
  <div id="stamp"></div>
</div>

<script>
const SITE = "https://grahamandgold.github.io/mi-data-center-tracker";
const EMBED_URL = SITE + "/embeds/moratorium-wave.html";

// crude equirectangular projection tuned to Michigan
const LON0=-90.9, LON1=-82.1, LAT0=41.5, LAT1=47.7, W=760, H=640;
const px = lon => (lon-LON0)/(LON1-LON0)*W;
const py = lat => (LAT1-lat)/(LAT1-LAT0)*H;

// simplified Michigan outline (lon,lat) — lower peninsula then upper peninsula
const LP=[[-86.82,41.76],[-86.62,42.42],[-86.21,43.06],[-86.54,44.06],[-86.25,44.7],[-85.56,45.16],[-85.38,44.9],[-85.1,45.37],[-84.91,45.41],[-84.13,45.5],[-83.48,45.35],[-83.32,45.0],[-83.44,44.3],[-83.87,43.96],[-83.95,43.65],[-83.67,43.6],[-83.47,43.73],[-82.94,44.07],[-82.6,43.9],[-82.42,43.0],[-82.55,42.6],[-83.1,42.3],[-83.19,41.96],[-84.8,41.71],[-86.82,41.76]];
const UP=[[-90.42,46.56],[-89.6,46.85],[-88.6,46.83],[-88.44,47.14],[-87.9,47.0],[-87.6,46.85],[-86.9,46.55],[-86.14,46.67],[-85.24,46.76],[-84.72,46.64],[-84.11,46.5],[-84.4,46.0],[-84.7,45.85],[-85.6,45.97],[-86.46,45.9],[-86.98,45.75],[-87.17,45.35],[-87.6,45.1],[-87.79,44.86],[-87.9,45.1],[-88.05,45.78],[-88.7,45.72],[-89.9,46.14],[-90.12,46.34],[-90.42,46.56]];
const poly = pts => pts.map(p=>px(p[0]).toFixed(1)+","+py(p[1]).toFixed(1)).join(" ");

const svg = document.getElementById("map");
svg.innerHTML = `<polygon points="${poly(LP)}" fill="#1f1d1b" stroke="#3a3734" stroke-width="1.5"/>
                 <polygon points="${poly(UP)}" fill="#1f1d1b" stroke="#3a3734" stroke-width="1.5"/>
                 <g id="dots"></g>`;

const monthKey = d => d.slice(0,7);
const monthLabel = k => new Date(k+"-15").toLocaleDateString("en-US",{month:"short",year:"2-digit"}).replace(" ","  ’");

async function loadData(){
  for (const u of ["../map-data.json", SITE+"/map-data.json"]) {
    try { const r = await fetch(u); if (r.ok) return r.json(); } catch(e){}
  }
  throw new Error("map-data.json unreachable");
}

loadData().then(data => {
  const mor = (data.map_points||[])
    .filter(p => p.layer==="moratoria" && p.verified_date && p.latitude)
    .sort((a,b) => a.verified_date.localeCompare(b.verified_date));
  if (!mor.length) return;
  document.getElementById("sub").textContent =
    mor.length + " Michigan communities have paused data-center development — watch the wave spread, month by month. Every pause links to a public record.";
  document.getElementById("stamp").textContent = "Data updated " + (data.updated_at||"").slice(0,10);

  // months axis
  const first = monthKey(mor[0].verified_date);
  const now = new Date();
  const months = [];
  let d = new Date(first+"-01T12:00:00");
  while (d <= now) { months.push(d.toISOString().slice(0,7)); d.setMonth(d.getMonth()+1); }

  const dots = document.getElementById("dots");
  const tip = document.getElementById("tip");
  mor.forEach((p,i) => {
    const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx", px(p.longitude)); c.setAttribute("cy", py(p.latitude));
    c.setAttribute("r", 0); c.setAttribute("fill", "#d92b2b"); c.setAttribute("fill-opacity", ".85");
    c.setAttribute("stroke", "#f5f1ea"); c.setAttribute("stroke-width", ".7");
    c.style.transition = "r .45s cubic-bezier(.2,1.4,.4,1)";
    c.dataset.i = i;
    c.addEventListener("mousemove", ev => {
      tip.style.display = "block";
      tip.innerHTML = `<b>${p.municipality||p.name}</b><span class="d">${p.county} County · paused ${p.verified_date}</span>`;
      const r = svg.parentElement.getBoundingClientRect();
      tip.style.left = Math.min(ev.clientX - r.left + 12, r.width-240) + "px";
      tip.style.top  = (ev.clientY - r.top + 12) + "px";
    });
    c.addEventListener("mouseleave", () => tip.style.display = "none");
    dots.appendChild(c);
  });

  // monthly bars
  const perMonth = months.map(k => mor.filter(p => monthKey(p.verified_date)===k).length);
  const maxM = Math.max(...perMonth, 1);
  const bars = document.getElementById("bars");
  months.forEach((k,mi) => {
    const b = document.createElement("div"); b.className = "b";
    b.style.height = Math.max(4, perMonth[mi]/maxM*100) + "%";
    if (mi % Math.ceil(months.length/8) === 0) b.innerHTML = `<span>${monthLabel(k)}</span>`;
    bars.appendChild(b);
  });

  const slider = document.getElementById("slider");
  slider.max = months.length - 1;

  function render(mi){
    const cutoff = months[mi];
    let n = 0;
    dots.childNodes.forEach((c,i) => {
      const on = monthKey(mor[i].verified_date) <= cutoff;
      c.setAttribute("r", on ? 7 : 0);
      if (on) n++;
    });
    document.getElementById("count").textContent = n;
    document.getElementById("month").textContent = monthLabel(cutoff);
    bars.childNodes.forEach((b,i) => b.classList.toggle("on", i <= mi));
  }
  slider.addEventListener("input", () => { stop(); render(+slider.value); });

  let timer = null;
  const playBtn = document.getElementById("play");
  function stop(){ if (timer){ clearInterval(timer); timer=null; playBtn.textContent="▶ Play"; } }
  playBtn.addEventListener("click", () => {
    if (timer) return stop();
    playBtn.textContent = "❚❚ Pause";
    if (+slider.value >= months.length-1) slider.value = 0;
    timer = setInterval(() => {
      slider.value = +slider.value + 1;
      render(+slider.value);
      if (+slider.value >= months.length-1) stop();
    }, 650);
  });

  render(months.length - 1);

  // embed code
  const code = `<iframe src="${EMBED_URL}" width="100%" height="780" style="border:0;max-width:820px" loading="lazy" title="Michigan moratorium wave — Michigan Data Center Tracker"></iframe>`;
  document.getElementById("embedCode").textContent = code;
  document.getElementById("embedBtn").addEventListener("click", () => {
    const box = document.getElementById("embedBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
  });
  document.getElementById("copyBtn").addEventListener("click", ev => {
    navigator.clipboard.writeText(code);
    ev.target.textContent = "Copied ✓";
    setTimeout(() => ev.target.textContent = "Copy embed code", 1500);
  });
}).catch(e => { document.getElementById("sub").textContent = "Live data is loading slowly — refresh to retry."; });
</script>
</body>
</html>
